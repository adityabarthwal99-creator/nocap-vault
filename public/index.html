<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOCAP VAULT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080808;
    color: white;
    font-family: Arial, sans-serif;
    min-height: 100vh;
  }

  header {
    background: #0c0c0c;
    padding: 26px 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    gap: 20px;
    box-shadow: 0 1px 40px rgba(255,255,255,0.04);
  }
  header img {
    height: 68px; width: 68px;
    object-fit: contain; border-radius: 12px;
    filter: drop-shadow(0 0 14px rgba(255,255,255,0.25));
  }
  .header-text h1 {
    font-size: 1.8rem; letter-spacing: 5px;
    color: #ffffff; font-weight: 700;
    text-shadow: 0 0 30px rgba(255,255,255,0.35);
  }
  .header-text p { color: #444; margin-top: 4px; font-size: 0.75rem; letter-spacing: 3px; }

  .search-bar { max-width: 520px; margin: 30px auto 0; padding: 0 20px; }
  .search-wrap {
    display: flex; align-items: center;
    background: #0f0f0f;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 0 16px; gap: 10px;
    box-shadow: 0 0 20px rgba(255,255,255,0.03), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap:focus-within {
    border-color: rgba(255,255,255,0.22);
    box-shadow: 0 0 28px rgba(255,255,255,0.07), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .search-wrap svg { opacity: 0.35; flex-shrink: 0; }
  .search-wrap input {
    flex: 1; background: transparent; border: none;
    outline: none; color: white; font-size: 0.95rem; padding: 14px 0;
  }
  .search-wrap input::placeholder { color: #383838; }

  .add-section {
    max-width: 500px; margin: 28px auto;
    background: #0c0c0c;
    border-radius: 18px; padding: 26px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 40px rgba(255,255,255,0.03), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .add-section h2 { margin-bottom: 16px; font-size: 0.78rem; color: #444; letter-spacing: 3px; }
  label { display: block; text-align: left; font-size: 0.72rem; color: #444; margin-bottom: 4px; margin-top: 14px; letter-spacing: 1.5px; }

  input[type=text], input[type=file] {
    width: 100%; padding: 11px 14px;
    background: #111;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 9px; color: white; font-size: 0.9rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type=file] { padding: 9px; cursor: pointer; }
  input[type=text]:focus {
    outline: none;
    border-color: rgba(255,255,255,0.2);
    box-shadow: 0 0 16px rgba(255,255,255,0.05);
  }

  button.add-btn {
    margin-top: 20px; width: 100%; padding: 14px;
    background: #fff;
    border: none; border-radius: 11px;
    color: #000; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; letter-spacing: 2.5px;
    box-shadow: 0 0 30px rgba(255,255,255,0.18);
    transition: box-shadow 0.2s, opacity 0.2s;
  }
  button.add-btn:hover {
    box-shadow: 0 0 45px rgba(255,255,255,0.28);
    opacity: 0.93;
  }

  #msg { margin-top: 10px; font-size: 0.82rem; min-height: 18px; }
  #msg.ok { color: #7effa8; }
  #msg.err { color: #ff5f5f; }

  .section-title {
    text-align: center; font-size: 0.7rem;
    letter-spacing: 3px; color: #2e2e2e;
    margin: 8px 0 22px;
  }

  .clients-grid {
    display: flex; flex-wrap: wrap;
    justify-content: center;
    gap: 20px; padding: 10px 20px 50px;
  }

  .card {
    background: #0c0c0c;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px; padding: 22px 18px;
    width: 244px; text-align: center;
    box-shadow: 0 0 20px rgba(255,255,255,0.02);
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  }
  .card:hover {
    border-color: rgba(255,255,255,0.18);
    box-shadow: 0 0 35px rgba(255,255,255,0.07);
    transform: translateY(-2px);
  }
  .card h2 { font-size: 0.95rem; margin-bottom: 14px; color: #e8e8e8; letter-spacing: 2px; }
  .card img {
    max-width: 130px; max-height: 70px;
    object-fit: contain; border-radius: 6px;
    background: #131313; padding: 6px; margin-bottom: 8px;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.08));
  }
  .no-logo { color: #2a2a2a; font-size: 0.78rem; margin-bottom: 8px; }

  .dl-logo {
    display: inline-block; margin: 4px 0 10px;
    color: #444; font-size: 0.72rem; text-decoration: none;
    transition: color 0.15s;
  }
  .dl-logo:hover { color: #aaa; }

  .lut-link {
    display: block;
    background: #101010;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 7px; padding: 7px 10px;
    margin: 4px 0; color: #bbb;
    text-decoration: none; font-size: 0.76rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .lut-link:hover {
    background: #161616;
    border-color: rgba(255,255,255,0.14);
    color: white;
  }

  button.del-btn {
    margin-top: 12px; padding: 7px 18px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; color: #444;
    cursor: pointer; font-size: 0.72rem; letter-spacing: 1px;
    transition: all 0.2s;
  }
  button.del-btn:hover { border-color: rgba(255,80,80,0.5); color: #ff5f5f; }

  #empty { text-align: center; color: #1e1e1e; padding: 60px; font-size: 0.85rem; letter-spacing: 2px; }
  .no-results { text-align: center; color: #2a2a2a; padding: 40px; font-size: 0.82rem; letter-spacing: 2px; }

  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent);
    margin: 0 auto 24px;
  }
</style>
</head>

<div class="add-section">
  <h2>ADD NEW CLIENT</h2>
  <label>CLIENT NAME</label>
  <input type="text" id="clientName" placeholder="e.g. RedBull, Nike...">
  <label>CLIENT LOGO</label>
  <input type="file" id="logoFile" accept="image/*">
  <label>LUT FILES (multiple)</label>
  <input type="file" id="lutFiles" multiple accept=".cube,.3dl,.lut,.clf">
  <button class="add-btn" onclick="addClient()">SAVE CLIENT</button>
  <div id="msg"></div>
</div>

<p class="section-title" id="clientCount"></p>
<div class="divider"></div>
<div class="clients-grid" id="clientsGrid"></div>

<script>
let allClients = [];

async function load() {
  allClients = await fetch('/data').then(r => r.json());
  renderClients(allClients);
}

function filterClients() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) return renderClients(allClients);
  const filtered = allClients.filter(c => c.name.toLowerCase().includes(q));
  renderClients(filtered, q);
}

function renderClients(data, query = '') {
  const grid = document.getElementById('clientsGrid');
  const countEl = document.getElementById('clientCount');
  countEl.textContent = data.length + ' CLIENT' + (data.length !== 1 ? 'S' : '');

  if (!allClients.length) {
    grid.innerHTML = '<div id="empty">NO CLIENTS YET — ADD ONE ABOVE</div>';
    return;
  }
  if (!data.length) {
    grid.innerHTML = '<div class="no-results">NO CLIENT FOUND FOR "' + query.toUpperCase() + '"</div>';
    return;
  }

  grid.innerHTML = data.map(c => `
    <div class="card">
      <h2>${c.name.toUpperCase()}</h2>
      ${c.logo
        ? `<img src="${c.logo}" alt="${c.name} logo"><br><a class="dl-logo" href="${c.logo}" download>↓ Download Logo</a>`
        : `<div class="no-logo">No logo uploaded</div>`}
      ${c.luts.length
        ? c.luts.map(l => `<a class="lut-link" href="${l.url}" download>▪ ${l.name}</a>`).join('')
        : `<div class="no-logo" style="margin-top:6px">No LUTs uploaded</div>`}
      <button class="del-btn" onclick="deleteClient('${c.name}')">DELETE</button>
    </div>
  `).join('');
}

async function addClient() {
  const name = document.getElementById('clientName').value.trim();
  const logo = document.getElementById('logoFile').files[0];
  const luts = document.getElementById('lutFiles').files;
  const msg = document.getElementById('msg');

  if (!name) { msg.className = 'err'; msg.textContent = 'Client name enter karo!'; return; }
  if (!logo && luts.length === 0) { msg.className = 'err'; msg.textContent = 'Logo ya LUT kuch toh upload karo!'; return; }

  msg.className = ''; msg.textContent = 'Uploading...';
  const fd = new FormData();
  fd.append('name', name);
  if (logo) fd.append('logo', logo);
  for (const f of luts) fd.append('luts', f);

  const res = await fetch('/upload', { method: 'POST', body: fd }).then(r => r.json());
  if (res.ok) {
    msg.className = 'ok'; msg.textContent = '✓ Saved — ' + name;
    document.getElementById('clientName').value = '';
    document.getElementById('logoFile').value = '';
    document.getElementById('lutFiles').value = '';
    load();
  } else {
    msg.className = 'err'; msg.textContent = 'Error: ' + (res.error || 'Unknown');
  }
}

async function deleteClient(name) {
  if (!confirm(name + ' ko delete karna chahte ho?')) return;
  await fetch('/client/' + encodeURIComponent(name), { method: 'DELETE' });
  load();
}

load();
</script>
</body>
</html>
